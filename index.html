<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyFolio | Futura</title>
    <meta name="description" content="EasyFolio - AI驱动的产品体验设计，创造有意义的世界">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Caveat:wght@400;600&family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; overflow-x: hidden; }
        body {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            color: #1a1a1a;
            background: #fefcf6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ TRANSITION OVERLAY ============ */
        .transition-overlay {
            position: fixed;
            inset: 0;
            background: #fefcf6;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        .transition-overlay.active {
            opacity: 1;
        }

        /* ============ CUSTOM CURSOR GLOW ============ */
        .cursor-glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(244,215,88,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            opacity: 0;
        }
        body:hover .cursor-glow { opacity: 1; }

        /* ============ HERO — TERMINAL STYLE ============ */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fefcf6;
            position: relative;
            overflow: hidden;
            padding: 2rem;
        }

        .terminal-window {
            width: 100%;
            max-width: 720px;
            background: #161b22;
            border-radius: 12px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
            overflow: hidden;
            position: relative;
            z-index: 2;
            will-change: transform, opacity;
            transition: none;
        }
        
        .terminal-window.scale-through {
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            background: #1c2129;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .terminal-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
        }
        .terminal-dot--red { background: #ff5f57; }
        .terminal-dot--yellow { background: #febc2e; }
        .terminal-dot--green { background: #28c840; }
        .terminal-header-title {
            flex: 1;
            text-align: center;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            margin-right: 52px;
        }

        .terminal-body {
            padding: 1.8rem 2rem 2.5rem;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: clamp(0.85rem, 1.8vw, 1rem);
            line-height: 1.8;
            min-height: 360px;
        }
        .terminal-line {
            opacity: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .terminal-line.visible { opacity: 1; }
        .terminal-line .cmd { color: #2B7FD8; }
        .terminal-line .cmd-text { color: #8b949e; }
        .terminal-line .output { color: #F4D758; }
        .terminal-line .highlight { color: #28c840; }
        .terminal-line .link {
            color: #F7A946;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
            cursor: pointer;
        }
        .terminal-line .emoji { color: #fff; }

        .terminal-cursor {
            display: inline-block;
            width: 0.6em;
            height: 1.15em;
            background: #F4D758;
            vertical-align: text-bottom;
            animation: cursorBlink 1s step-end infinite;
        }
        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 修复：确保 hero-scroll 居中 */
        .hero-scroll {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            opacity: 0;
            animation: fadeInUp 0.6s 8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            width: auto;
            margin: 0;
            padding: 0;
            transition: opacity 0.5s ease-out;
        }
        .hero-scroll span {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #666;
            white-space: nowrap;
        }
        .hero-scroll-line {
            width: 2px; height: 48px;
            background: #5a7a50;
            opacity: 0.5;
            border-radius: 1px;
            animation: scrollPulse 2s ease-in-out infinite;
        }
        @keyframes scrollPulse {
            0%, 100% { transform: scaleY(1); opacity: 0.35; }
            50% { transform: scaleY(1.6); opacity: 0.8; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .terminal-window { border-radius: 8px; }
            .terminal-body { padding: 1.2rem 1rem 2rem; font-size: 0.8rem; min-height: 280px; }
            .terminal-header-title { display: none; }
            .enter-btn { padding: 10px 24px; font-size: 0.875rem; }
            .hero-scroll { bottom: 2rem; }
            .hero-scroll span { font-size: 0.55rem; }
        }
    </style>
</head>
<body>
    <!-- Transition Overlay -->
    <div class="transition-overlay" id="transitionOverlay"></div>

    <!-- Cursor glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <section class="hero">
        <div class="terminal-window">
            <div class="terminal-header">
                <div class="terminal-dot terminal-dot--red"></div>
                <div class="terminal-dot terminal-dot--yellow"></div>
                <div class="terminal-dot terminal-dot--green"></div>
                <div class="terminal-header-title">FUTURA@Trae ai~ %</div>
            </div>
            <div class="terminal-body" id="terminalBody">
                <!-- Lines injected by JS typewriter -->
            </div>
        </div>
        <div class="hero-scroll">
            <span>Scroll to Know more</span>
            <div class="hero-scroll-line"></div>
        </div>
    </section>

    <script>
        /* ============ TERMINAL TYPEWRITER ============ */
        (function() {
            const body = document.getElementById('terminalBody');
            
            const lines = [
                { type: 'cmd',    text: '$ who am i' },
                { type: 'output', html: '<span class="output">Futura</span>' },
                { type: 'blank' },
                { type: 'cmd',    text: '$ about.md' },
                { type: 'output', html: '<span class="output">活在网上也活在当下 | INTJ</span>' },
                { type: 'output', html: '<span class="output">AI native 的产品创新 </span>' },
                { type: 'output', html: '<span class="link" onclick="enterPortfolio()">✨ AI coding让爱好更多可能</span>' },
                { type: 'blank' },
                { type: 'cmd',    text: '$ echo "One Directs, then AI agents Enable."' },
                { type: 'output', html: '<span class="highlight">🚀</span>' },
            ];

            const lineEls = [];
            lines.forEach(line => {
                const div = document.createElement('div');
                div.className = 'terminal-line';
                if (line.type === 'blank') {
                    div.innerHTML = '&nbsp;';
                }
                lineEls.push({ el: div, data: line });
                body.appendChild(div);
            });

            const cursorLine = document.createElement('div');
            cursorLine.className = 'terminal-line visible';
            cursorLine.innerHTML = '<span class="terminal-cursor"></span>';
            cursorLine.style.opacity = '0';
            body.appendChild(cursorLine);

            let lineIdx = 0;

            function typeNextLine() {
                if (lineIdx >= lineEls.length) {
                    cursorLine.style.opacity = '1';
                    return;
                }

                const { el, data } = lineEls[lineIdx];
                el.classList.add('visible');
                lineIdx++;

                if (data.type === 'blank') {
                    setTimeout(typeNextLine, 150);
                    return;
                }

                if (data.type === 'cmd') {
                    typeText(el, data.text, 'cmd', 45, () => {
                        setTimeout(typeNextLine, 300);
                    });
                } else {
                    const prefix = '<span class="cmd">&gt; </span>';
                    el.innerHTML = prefix;
                    setTimeout(() => {
                        el.innerHTML = prefix + data.html;
                        setTimeout(typeNextLine, 200);
                    }, 120);
                }
            }

            function typeText(el, text, className, speed, callback) {
                const parts = text.match(/^(\$ )(.*)/);
                let charIdx = 0;

                if (parts) {
                    el.innerHTML = '<span class="cmd">$ </span>';
                    const restText = parts[2];
                    charIdx = 0;

                    function typeChar() {
                        if (charIdx < restText.length) {
                            el.innerHTML = '<span class="cmd">$ </span><span class="cmd-text">' + restText.substring(0, charIdx + 1) + '</span>';
                            charIdx++;
                            setTimeout(typeChar, speed + Math.random() * 30);
                        } else {
                            if (callback) callback();
                        }
                    }
                    typeChar();
                } else {
                    el.textContent = '';
                    function typeChar() {
                        if (charIdx < text.length) {
                            el.textContent += text[charIdx];
                            charIdx++;
                            setTimeout(typeChar, speed);
                        } else {
                            if (callback) callback();
                        }
                    }
                    typeChar();
                }
            }

            setTimeout(typeNextLine, 600);
        })();

        /* ============ MOUSE FOLLOW CURSOR GLOW ============ */
        (function() {
            const glow = document.getElementById('cursorGlow');
            let mx = 0, my = 0, gx = 0, gy = 0;

            document.addEventListener('mousemove', (e) => {
                mx = e.clientX;
                my = e.clientY;
            });

            function animate() {
                gx += (mx - gx) * 0.08;
                gy += (my - gy) * 0.08;
                glow.style.left = gx + 'px';
                glow.style.top = gy + 'px';
                requestAnimationFrame(animate);
            }
            animate();
        })();

        /* ============ SCROLL WHEEL TO NAVIGATE TO PORTFOLIO.HTML WITH TRANSITION EFFECT ============ */
        (function() {
            let scrollCount = 0;
            const scrollThreshold = 1;
            let isTransitioning = false;

            function handleWheel(e) {
                if (isTransitioning) return;
                
                if (e.deltaY > 0) {
                    scrollCount++;
                    if (scrollCount >= scrollThreshold) {
                        enterPortfolio();
                    }
                } else if (e.deltaY < 0) {
                    scrollCount = Math.max(0, scrollCount - 1);
                }
            }

            function enterPortfolio() {
                const terminalWindow = document.querySelector('.terminal-window');
                const terminalBody = document.getElementById('terminalBody');
                const cursorGlow = document.getElementById('cursorGlow');
                const heroScroll = document.querySelector('.hero-scroll');
                const overlay = document.getElementById('transitionOverlay');
                
                isTransitioning = true;
                
                // Hide cursor glow and scroll hint
                cursorGlow.style.opacity = '0';
                if (heroScroll) heroScroll.style.opacity = '0';
                
                // Add "launching..." line
                const launchLine = document.createElement('div');
                launchLine.className = 'terminal-line';
                launchLine.innerHTML = '<span class="output">&gt; launching...</span>';
                terminalBody.appendChild(launchLine);
                setTimeout(() => { launchLine.classList.add('visible'); }, 50);
                
                // Add progress bar line
                const progressLine = document.createElement('div');
                progressLine.className = 'terminal-line';
                progressLine.innerHTML = '<span class="highlight" id="progressText">[░░░░░░░░░░░░] 0%</span>';
                terminalBody.appendChild(progressLine);
                setTimeout(() => { progressLine.classList.add('visible'); }, 300);
                
                // Animate progress bar
                let progress = 0;
                const barLength = 12;
                
                setTimeout(() => {
                    const progressText = document.getElementById('progressText');
                    const interval = setInterval(() => {
                        progress += 1;
                        if (progress > barLength) {
                            clearInterval(interval);
                            beginZoom();
                            return;
                        }
                        let filled = '';
                        let empty = '';
                        for (let i = 0; i < barLength; i++) {
                            if (i < progress) filled += '█';
                            else empty += '░';
                        }
                        const pct = Math.round((progress / barLength) * 100);
                        if (progressText) {
                            progressText.textContent = '[' + filled + empty + '] ' + pct + '%';
                        }
                    }, 80);
                }, 500);
                
                function beginZoom() {
                    // Add expanding class to prepare for zoom
                    terminalWindow.classList.add('expanding');
                    
                    // Calculate scale to fill viewport
                    const screenRect = terminalWindow.getBoundingClientRect();
                    const vw = window.innerWidth;
                    const vh = window.innerHeight;
                    const scaleX = vw / screenRect.width;
                    const scaleY = vh / screenRect.height;
                    const scale = Math.max(scaleX, scaleY) * 1.05;
                    
                    // Calculate translation to center
                    const screenCenterX = screenRect.left + screenRect.width / 2;
                    const screenCenterY = screenRect.top + screenRect.height / 2;
                    const vpCenterX = vw / 2;
                    const vpCenterY = vh / 2;
                    
                    const tx = vpCenterX - screenCenterX;
                    const ty = vpCenterY - screenCenterY;
                    
                    // Apply zoom transform with opacity fade simultaneously
                    setTimeout(() => {
                        terminalWindow.style.transition = 'transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), filter 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
                        terminalWindow.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
                        terminalWindow.style.opacity = '0';
                        terminalWindow.style.filter = 'blur(4px)';
                        
                        // Show transition overlay at the same time
                        overlay.classList.add('active');
                        
                        // Navigate to portfolio.html after transition completes
                        setTimeout(() => {
                            window.location.href = 'portfolio.html';
                        }, 1500);
                    }, 100);
                }
            }

            window.addEventListener('wheel', handleWheel, { passive: true });
        })();
    </script>
</body>
</html>
