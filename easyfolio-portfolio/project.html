<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 — Futura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // 在DOM加载前检查URL参数，避免地图视图闪现
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const section = urlParams.get('section');
            if (section) {
                document.documentElement.classList.add('article-view-init');
            }
        })();
    </script>
    <style>
    /* ============================================================
       VARIABLES
       ============================================================ */
    :root{
      --cream:#f5f2eb; --cream-dk:#ede9e0; --white:#fff;
      --ink:#1a2010; --ink-lt:#3a4a30;
      --sage:#4a5d3e; --sage-lt:#6a7d5e; --sage-pale:rgba(74,93,62,.07);
      --accent:#cfa767; --muted:#8a9a80;
      --border:rgba(74,93,62,.18); --border-lt:rgba(74,93,62,.09);
      --font-mono:'JetBrains Mono',monospace;
      --font-disp:'Syne','Noto Sans SC',sans-serif;
      --font-body:'Noto Sans SC','Inter',sans-serif;
      --hdr:54px; --nav-w:220px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;background:var(--cream);color:var(--ink);font-family:var(--font-body);}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

    /* ============================================================
       HEADER
       ============================================================ */
    .hdr{
      position:fixed;top:0;left:0;right:0;height:var(--hdr);
      background:var(--cream);border-bottom:1px solid var(--border);
      display:flex;align-items:center;z-index:200;
      background-image:linear-gradient(rgba(74,93,62,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(74,93,62,.06) 1px,transparent 1px);
      background-size:32px 32px;
    }
    .hdr-back{
      flex-shrink:0;height:100%;display:flex;align-items:center;padding:0 20px;gap:10px;
      text-decoration:none;color:var(--sage);font-family:var(--font-mono);font-size:11px;font-weight:600;
      letter-spacing:.15em;text-transform:uppercase;border-right:1px solid var(--border);
      background:rgba(255,255,255,.5);transition:background .2s;
    }
    .hdr-back:hover{background:var(--sage-pale);}
    .hdr-back:hover .ba{transform:translateX(-3px);}
    .ba{font-size:15px;opacity:.7;transition:transform .2s;}

    .hdr-back.map-mode{width:auto;}
    .hdr-back.article-mode{width:var(--nav-w);}

    .hdr-body{flex:1;display:flex;align-items:center;gap:14px;padding:0 22px;}
    .h-idx{font-family:var(--font-mono);font-size:10px;color:var(--sage);opacity:.45;letter-spacing:.2em;flex-shrink:0;}
    .h-title{font-family:var(--font-disp);font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .h-tags{display:flex;gap:5px;flex-shrink:0;}
    .h-tag{padding:3px 9px;font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--sage);background:var(--sage-pale);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.1em;clip-path:polygon(0 0,100% 0,95% 100%,0 100%);}
    .hdr-meta{flex-shrink:0;padding:0 18px;height:100%;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:2px;background:rgba(255,255,255,.4);}
    .hm-row{font-family:var(--font-mono);font-size:9px;color:var(--sage);opacity:.55;letter-spacing:.1em;}
    .hm-row strong{color:var(--ink);font-weight:700;}

    /* ============================================================
       VIEWS CONTAINER
       ============================================================ */
    .views{position:fixed;top:var(--hdr);left:0;right:0;bottom:0;}

    /* ============================================================
       VIEW 1 — MINDMAP 全屏画布
       ============================================================ */
    .view-map{
      position:absolute;inset:0;
      background-color:var(--cream-dk);
      background-image:radial-gradient(circle,rgba(74,93,62,.18) 1.2px,transparent 1.2px);
      background-size:24px 24px;
      transition:opacity .5s ease,transform .5s cubic-bezier(.22,1,.36,1);
      overflow:hidden;
    }
    .view-map.hidden{opacity:0;transform:scale(.97);pointer-events:none;}
    .article-view-init .view-map{opacity:0;transform:scale(.97);pointer-events:none;}

    .map-hint{
      position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
      font-family:var(--font-mono);font-size:9px;font-weight:700;
      color:var(--sage);opacity:.35;letter-spacing:.25em;text-transform:uppercase;
      white-space:nowrap;pointer-events:none;
    }

    .map-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible;}
    .map-svg path{
      stroke-linecap:round;
      stroke-linejoin:round;
      transition:all .5s cubic-bezier(.22,1,.36,1);
    }
    
    /* 顺时针主线 - 叙事连接线（主题绿色） */
    .map-svg path.main-line{
      stroke-dasharray:14 4;
      animation:mainFlow 4s cubic-bezier(.4,0,.2,1) infinite;
      stroke-width:1;
      opacity:.55;
    }
    .map-svg path.main-line.final-line{
      stroke-dasharray:16 5;
      animation:finalFlow 4.5s cubic-bezier(.4,0,.2,1) infinite;
      stroke-width:1.4;
      opacity:.65;
    }
    
    /* 虚线回指箭头 */
    .map-svg path.loop-line{
      animation:loopPulse 4s ease-in-out infinite;
      opacity:.3;
    }
    
    /* 分支连接线 */
    .map-svg path.branch-line{
      opacity:.3;
      stroke-width:0.35;
    }
    
    /* 流动动画 */
    @keyframes mainFlow{
      0%{stroke-dashoffset:0;}
      100%{stroke-dashoffset:-18;}
    }
    @keyframes finalFlow{
      0%{stroke-dashoffset:0;}
      100%{stroke-dashoffset:-21;}
    }
    @keyframes loopPulse{
      0%,100%{opacity:.22;}
      50%{opacity:.35;}
    }
    
    /* 节点标记交互 */
    .node-marker{
      transition:all .35s cubic-bezier(.22,1,.36,1);
      cursor:pointer;
      opacity:.55;
    }
    .map-svg:hover .node-marker{opacity:.45;}
    .map-svg .node-marker:hover{
      opacity:1;
      transform:scale(1.5);
      filter:url(#dotGlowHover);
    }
    
    /* 中心节点标记 */
    .center-marker{
      transition:all .4s cubic-bezier(.22,1,.36,1);
      animation:centerPulse 2.5s ease-in-out infinite;
      opacity:.65;
    }
    @keyframes centerPulse{
      0%,100%{transform:scale(1);opacity:.65;}
      50%{transform:scale(1.15);opacity:.85;}
    }
    
    /* 主线悬停增强效果 */
    .map-svg:hover path.main-line{
      opacity:.7;
    }
    .map-svg:hover path.main-line.final-line{
      stroke-width:1.6;
      opacity:.8;
    }
    
    /* 连接线高亮状态 */
    .map-svg path.highlighted{
      opacity:.85;
      stroke-width:1.6;
    }
    
    /* 箭头脉冲动画 */
    @keyframes arrowPulse{
      0%,100%{opacity:.5;transform:scale(0.95);}
      50%{opacity:1;transform:scale(1.05);}
    }
    @keyframes arrowGlow{
      0%,100%{filter:drop-shadow(0 0 2px rgba(74,93,62,0.4));}
      50%{filter:drop-shadow(0 0 6px rgba(74,93,62,0.7));}
    }
    .map-svg marker{
      animation:arrowPulse 2s ease-in-out infinite, arrowGlow 2s ease-in-out infinite;
    }

    /* 中央核心节点 - 默认黄色聚焦样式 */
    .m-center {
  position:absolute;transform:translate(-50%,-50%);
  background:#fff;
  border:1.5px solid rgba(207,167,103,.4);border-left:6px solid var(--accent);
  padding:22px 36px 24px;z-index:6;
  cursor:pointer; /* 修改这里：从 default 改为 pointer */
  min-width:190px;max-width:260px;
  box-shadow:0 12px 48px rgba(207,167,103,.18),0 0 0 1px rgba(207,167,103,.1);
  border-radius:12px;
  transition: transform 0.3s ease; /* 添加过度动画 */
}

/* 添加一个悬停效果 */
.m-center:hover {
  transform: translate(-50%, -50%) scale(1.03);
  box-shadow: 0 15px 55px rgba(207,167,103,.25);
}
    .m-center::before{content:'';position:absolute;top:-1px;left:28px;width:70px;height:6px;background:linear-gradient(90deg, var(--accent) 0%, rgba(207,167,103,.6) 100%);border-radius:0 0 6px 6px;box-shadow:0 2px 12px rgba(207,167,103,.3);}
    .mc-num{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--accent);opacity:.7;letter-spacing:.2em;text-transform:uppercase;display:block;margin-bottom:6px;}
    .mc-title{font-family:var(--font-disp);font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-.02em;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mc-sub{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:7px;display:block;opacity:.85;}

    /* 章节节点 */
    .m-node{
      position:absolute;transform:translate(-50%,-50%);
      background:linear-gradient(145deg, rgba(255,255,255,.98) 0%, rgba(248,250,246,.95) 100%);
      border:1.5px solid rgba(74,93,62,.22);border-left:5px solid rgba(74,93,62,.35);
      padding:14px 20px 16px;cursor:pointer;z-index:5;
      min-width:135px;max-width:185px;
      border-radius:8px;
      transition:all .35s cubic-bezier(.22,1,.36,1);
      box-shadow:0 6px 24px rgba(74,93,62,.1);
    }
    .m-node::before{content:'';position:absolute;top:-1px;left:16px;width:40px;height:4px;background:linear-gradient(90deg, rgba(74,93,62,.4) 0%, rgba(74,93,62,.2) 100%);border-radius:0 0 4px 4px;transition:all .3s;}
    .m-node:hover{
      border-color:rgba(74,93,62,.5);border-left-color:var(--sage);
      background:#fff;box-shadow:0 12px 48px rgba(74,93,62,.18),0 0 0 1px rgba(74,93,62,.1);
      transform:translate(-50%,-50%) scale(1.06);
    }
    .m-node.active{
      border-color:var(--sage);border-left-color:var(--sage);border-left-width:6px;
      background:#fff;box-shadow:0 10px 40px rgba(74,93,62,.16),0 0 0 5px rgba(74,93,62,.08);
      animation:activePulse 1s ease-out;
    }
    .m-node.active::before{background:var(--sage);width:52px;box-shadow:0 2px 10px rgba(74,93,62,.25);}
    .m-node:hover::before{background:var(--sage);width:48px;box-shadow:0 2px 10px rgba(74,93,62,.2);}
    
    @keyframes activePulse{
      0%{transform:translate(-50%,-50%) scale(1.05);box-shadow:0 0 0 8px rgba(74,93,62,0.1);}
      100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 10px 40px rgba(74,93,62,.18),0 0 0 5px rgba(74,93,62,.08);}
    }

    .mn-order{
      position:absolute;top:-10px;right:-10px;
      width:24px;height:24px;
      background:var(--sage);color:#fff;
      font-family:var(--font-mono);font-size:11px;font-weight:700;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      box-shadow:0 3px 10px rgba(74,93,62,.28);
    }
    .mn-lbl{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--sage);opacity:.55;letter-spacing:.2em;text-transform:uppercase;display:block;margin-bottom:4px;}
    .mn-title{font-family:var(--font-disp);font-size:16px;font-weight:800;color:var(--ink);line-height:1.35;display:block;}
    .mn-desc{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);margin-top:5px;display:block;line-height:1.5;opacity:0;transform:translateY(4px);transition:all .35s cubic-bezier(.22,1,.36,1);}
    .m-node:hover .mn-desc{opacity:.85;transform:translateY(0);}

    .mn-enter{
      position:absolute;bottom:12px;right:14px;
      font-family:var(--font-mono);font-size:12px;color:var(--sage);
      opacity:0;transform:translateX(4px);transition:all .25s;
    }
    .m-node:hover .mn-enter{opacity:.6;transform:translateX(0);}

    /* 叙事起点节点 - WHY（与CHALLENGE一致的绿色样式） */
    .m-node.m-node-start{
      border-left-color:var(--sage);
      box-shadow:0 6px 24px rgba(74,93,62,.16);
    }
    .m-node.m-node-start::before{
      background:linear-gradient(90deg, var(--sage) 0%, rgba(106,125,94,.6) 100%);
      width:40px;
      box-shadow:0 2px 8px rgba(74,93,62,.35);
    }
    .m-node.m-node-start .mn-order{
      background:var(--sage);
    }

    /* AI工具链支撑节点 - 缩小字号，标题同行 */
    .m-node.m-node-support{
      min-width:100px;max-width:140px;
      padding:10px 14px 12px;
      border-left-width:4px;
      box-shadow:0 4px 16px rgba(74,93,62,.08);
    }
    .m-node.m-node-support .mn-lbl{
      font-size:8px;
      margin-bottom:2px;
    }
    .m-node.m-node-support .mn-title{
      font-size:12px;
      display:inline;
      margin-left:6px;
    }
    .m-node.m-node-support .mn-order{
      display:none;
    }

    /* 破局转折节点 - CHALLENGE */
    .m-node.m-node-challenge{
      border-left-color:var(--sage);
      box-shadow:0 6px 24px rgba(74,93,62,.16);
    }
    .m-node.m-node-challenge::before{
      background:linear-gradient(90deg, var(--sage) 0%, rgba(106,125,94,.6) 100%);
      width:40px;
      box-shadow:0 2px 8px rgba(74,93,62,.35);
    }

    /* Phase 研究 */
    .m-node[data-phase="research"]::before{background:linear-gradient(90deg, rgba(106,125,94,.75) 0%, rgba(106,125,94,.4) 100%);width:38px;box-shadow:0 2px 6px rgba(106,125,94,.3);}
    .m-node[data-phase="research"]{border-left-color:rgba(106,125,94,.5);}
    .m-node[data-phase="research"].active,.m-node[data-phase="research"]:hover{border-left-color:var(--sage);}
    .m-node[data-phase="research"].active::before,.m-node[data-phase="research"]:hover::before{background:var(--sage);box-shadow:0 2px 8px rgba(106,125,94,.35);}
    /* Phase 输出 */
    .m-node[data-phase="output"]::before{background:linear-gradient(90deg, rgba(106,125,94,.75) 0%, rgba(106,125,94,.4) 100%);width:38px;box-shadow:0 2px 6px rgba(106,125,94,.3);}
    .m-node[data-phase="output"]{border-left-color:rgba(106,125,94,.5);}
    .m-node[data-phase="output"].active,.m-node[data-phase="output"]:hover{border-left-color:var(--sage);}
    .m-node[data-phase="output"].active::before,.m-node[data-phase="output"]:hover::before{background:var(--sage);box-shadow:0 2px 8px rgba(106,125,94,.35);}

    /* 支撑节点 */
    .m-node-support{
      min-width:80px;max-width:100px;
      border-color:rgba(74,93,62,.15);border-style:dashed;
      padding:8px 12px 9px;
      opacity:.7;
    }
    .m-node-support:hover{
      opacity:1;transform:translate(-50%,-50%) scale(1.05);
      border-style:solid;border-color:rgba(74,93,62,.3);
    }

    .mn-phase{
      font-family:var(--font-mono);font-size:7px;font-weight:700;
      color:var(--muted);opacity:.75;letter-spacing:.15em;text-transform:uppercase;
      display:block;margin-bottom:2px;
    }

    /* 图例 */
    .map-legend{
      position:absolute;bottom:22px;right:24px;
      display:flex;flex-direction:column;gap:6px;
      pointer-events:none;
    }
    .legend-item{display:flex;align-items:center;gap:8px;}
    .legend-line{width:28px;height:2px;background:linear-gradient(90deg, rgba(74,93,62,0.8) 0%, rgba(106,125,94,0.9) 100%);border-radius:1px;}
    .legend-line.main{box-shadow:0 0 4px rgba(74,93,62,0.3);}
    .legend-line.loop{width:28px;height:1px;background:transparent;border-top:1.5px dashed rgba(106,125,94,0.4);}
    .legend-dot{width:6px;height:6px;background:rgba(74,93,62,0.6);border-radius:50%;box-shadow:0 0 4px rgba(74,93,62,0.3);}
    .legend-label{font-family:var(--font-mono);font-size:8px;color:var(--sage);opacity:.55;letter-spacing:.12em;text-transform:uppercase;}

    .map-phase-label{
      position:absolute;font-family:var(--font-mono);font-size:8px;font-weight:700;
      color:var(--sage);opacity:.25;letter-spacing:.2em;text-transform:uppercase;
      pointer-events:none;
    }

    /* ============================================================
       VIEW 2 — 导航树 + 文章 (两栏)
       ============================================================ */
    .view-article{
      position:absolute;inset:0;
      display:flex;overflow:hidden;
      transition:opacity .5s ease,transform .5s cubic-bezier(.22,1,.36,1);
    }
    .view-article.hidden{opacity:0;transform:scale(1.02);pointer-events:none;}
    .article-view-init .view-article.hidden{opacity:1;transform:scale(1);pointer-events:auto;}

    /* ---- 左栏：导航树 ---- */
    .nav-panel{
      flex-shrink:0;width:var(--nav-w);height:100%;
      background:var(--cream);border-right:2px dashed rgba(74,93,62,.22);
      display:flex;flex-direction:column;overflow:hidden;
    }
    .nav-hdr{
      flex-shrink:0;padding:14px 14px 10px;
      border-bottom:1px dashed rgba(74,93,62,.18);
      font-family:var(--font-mono);font-size:9px;font-weight:700;
      color:var(--sage);opacity:.45;letter-spacing:.22em;text-transform:uppercase;
    }
    .nav-list{flex:1;overflow-y:auto;padding:6px 8px;scrollbar-width:thin;scrollbar-color:var(--sage) transparent;}
    .nav-list::-webkit-scrollbar{width:2px;}
    .nav-list::-webkit-scrollbar-thumb{background:var(--sage);}

    .nav-item{
      display:flex;align-items:center;gap:9px;padding:9px 10px;
      cursor:pointer;border-left:2px solid transparent;margin-bottom:2px;
      transition:all .18s;position:relative;
    }
    .nav-item:hover{background:var(--sage-pale);}
    .nav-item.active{background:rgba(74,93,62,.06);border-left-color:var(--sage);}

    .nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(74,93,62,.35);background:var(--cream);transition:all .2s;}
    .nav-item.active .nav-dot{background:var(--sage);border-color:var(--sage);}
    .nav-item:hover .nav-dot{border-color:var(--sage);}

    .nav-name{flex:1;font-family:var(--font-body);font-size:14.5px;font-weight:400;color:var(--ink-lt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s;}
    .nav-item.active .nav-name{color:var(--sage);font-weight:700;}
    .nav-prog{position:absolute;bottom:0;left:12px;right:8px;height:1px;background:rgba(74,93,62,.07);}
    .nav-prog-fill{height:100%;background:var(--sage);width:0%;transition:width .3s ease;}

    .nav-footer{flex-shrink:0;padding:10px 10px 14px;border-top:1px dashed rgba(74,93,62,.18);}
    .nav-map-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:9px 0;cursor:pointer;
      border:1.5px dashed rgba(74,93,62,.3);
      color:var(--sage);font-family:var(--font-mono);font-size:10px;font-weight:700;
      letter-spacing:.15em;text-transform:uppercase;
      transition:all .2s;background:transparent;width:100%;
    }
    .nav-map-btn:hover{background:var(--sage-pale);border-color:var(--sage);border-style:solid;}

    /* ---- 右栏：文章 ---- */
    .art-panel{flex:1;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--cream);scrollbar-width:thin;scrollbar-color:var(--sage) transparent;user-select:text;}
    .art-panel::-webkit-scrollbar{width:4px;}
    .art-panel::-webkit-scrollbar-thumb{background:var(--sage);border-radius:2px;}
    .read-bar{position:sticky;top:0;left:0;width:0%;height:3px;background:linear-gradient(to right,var(--sage),var(--accent));z-index:50;transition:width .1s linear;}
    .art-body{max-width:700px;margin:0 auto;padding:44px 48px 80px;}

    /* ---- 文章内容组件 ---- */
    .art-section{padding-top:8px;padding-bottom:50px;scroll-margin-top:20px;}

    .sec-eye{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
    .sec-n{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--sage);opacity:.4;letter-spacing:.2em;}
    .sec-badge{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--sage);background:var(--sage-pale);border:1px solid var(--border);padding:2px 8px;text-transform:uppercase;letter-spacing:.1em;clip-path:polygon(0 0,100% 0,94% 100%,0 100%);}
    .sec-label{
      font-family:var(--font-mono);font-size:9px;font-weight:700;
      color:var(--sage);opacity:.5;letter-spacing:.25em;text-transform:uppercase;
      display:block;margin-bottom:7px;
    }
    .sec-title{
      font-family:var(--font-disp);font-size:25px;font-weight:900;
      color:var(--ink);letter-spacing:-.03em;line-height:1.15;
      margin-bottom:14px;display:block;
      position:relative;
    }
    .sec-title::after{content:'';position:absolute;bottom:-5px;left:0;width:30px;height:3px;background:var(--sage);}
    .sec-title.sm{font-size:19px;}
    .sec-text{font-size:15.5px;color:var(--ink-lt);line-height:1.6;opacity:.88;}
    .sec-text p{margin-bottom:16px;}
    .sec-text p:last-child{margin-bottom:0;}
    .sec-text a{color:var(--sage);text-decoration:none;border-bottom:1px solid rgba(74,93,62,.3);transition:all .2s;}
    .sec-text a:hover{color:var(--ink);border-color:var(--sage);}
    
    .art-lead{font-size:16px;line-height:1.75;color:var(--ink);font-weight:500;margin-top:20px;padding-left:16px;border-left:4px solid var(--sage);}
    /* 让特定加粗文本继承 art-lead 的风格 */
.sec-text strong.art-lead-bold {
    display: block; /* 确保占满整行 */
    font-size: 16px;
    line-height: 1.5;
    color: var(--ink);
    font-weight: 500;
    padding-left: 16px;
    border-left: 4px solid var(--sage); /* 核心的左侧竖线 */
}

    /* 图片 */
    .art-img{width:100%;border-radius:4px;display:block;margin:16px 0;box-shadow:0 8px 32px rgba(74,93,62,.1);}
    .art-img.caption{margin-bottom:6px;}
    .art-caption{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:center;margin-bottom:20px;}

    /* 引用 */
    .art-quote{
      border-left:3px solid var(--sage);padding-left:20px;margin:20px 0;
      font-style:italic;color:var(--ink-lt);font-size:15px;line-height:1.7;
    }
    
    /* Callout */
    .callout{margin:20px 0;padding:16px 20px;background:rgba(74,93,62,.04);border:1px solid rgba(74,93,62,.12);border-left:4px solid var(--sage);position:relative;}
    .callout::before{content:'';position:absolute;top:0;right:0;width:12px;height:12px;border-top:2px solid var(--sage);border-right:2px solid var(--sage);opacity:.4;}
    .cl-lbl{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--sage);opacity:.6;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px;display:block;}
    .cl-txt{font-size:13.5px;line-height:1.7;color:var(--ink-lt);}
    
    /* Info Grid */
    .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;margin:18px 0;border:1px solid var(--border);}
    .ic{padding:10px 12px;background:var(--cream);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
    .ic:nth-child(even){border-right:none;}
    .ic-l{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--sage);opacity:.5;text-transform:uppercase;letter-spacing:.15em;display:block;margin-bottom:3px;}
    .ic-l::before{content:'// ';opacity:.8;}
    .ic-v{font-family:var(--font-disp);font-size:15px;font-weight:700;color:var(--ink);}
    
    /* Metrics */
    .metrics{display:flex;gap:1px;margin:18px 0;border:1px solid var(--border);}
    .met{flex:1;padding:13px;background:var(--white);border-right:1px solid var(--border);text-align:center;}
    .met:last-child{border-right:none;}
    .met-n{font-family:var(--font-mono);font-size:24px;font-weight:900;color:var(--sage);display:block;line-height:1;}
    .met-u{font-family:var(--font-mono);font-size:9.5px;color:var(--sage);opacity:.5;display:block;margin-top:3px;}
    .met-d{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
    
    /* Steps */
    .steps{margin:16px 0;border:1px solid var(--border);}
    .step{display:flex;border-bottom:1px solid var(--border-lt);}
    .step:last-child{border-bottom:none;}
    .sn{flex-shrink:0;width:38px;padding:11px 0;display:flex;align-items:flex-start;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--sage);opacity:.35;border-right:1px solid var(--border-lt);background:rgba(74,93,62,.02);}
    .sb{flex:1;padding:11px 13px;}
    .st{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px;display:block;}
    .sd{font-size:12px;line-height:1.6;color:var(--muted);}
    
    /* Tag Cloud */
    .tagcloud{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0;}
    .tp{padding:4px 11px;background:var(--sage-pale);border:1px solid rgba(74,93,62,.3);font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--sage);text-transform:uppercase;letter-spacing:.1em;clip-path:polygon(0 0,100% 0,95% 100%,0 100%);}

    /* 列表 */
    .art-list{padding-left:22px;margin:12px 0;}
    .art-list li{margin-bottom:8px;color:var(--ink-lt);font-size:14px;line-height:1.7;}

    /* 表格容器 */
    .art-table-wrapper{
      width:100%;
      overflow-x:auto;
      margin:20px 0;
    }
    
    /* 表格 */
    .art-table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      border:1px solid var(--border);
    }
    
    .art-table thead{
      position:sticky;
      top:0;
      z-index:1;
    }
    
    .art-table th{
      padding:11px 13px;
      font-family:var(--font-mono);
      font-size:9px;
      font-weight:700;
      color:var(--sage);
      letter-spacing:.15em;
      text-transform:uppercase;
      background:var(--sage-pale);
      border-bottom:1px solid var(--border);
      border-right:1px solid var(--border);
      text-align:left;
    }
    
    .art-table th:last-child{
      border-right:none;
    }
    
    .art-table td{
      padding:11px 13px;
      color:var(--ink-lt);
      background:var(--white);
      border-bottom:1px solid var(--border-lt);
      border-right:1px solid var(--border-lt);
      transition:all 0.15s ease;
    }
    
    .art-table td:last-child{
      border-right:none;
    }
    
    .art-table tbody tr:hover td{
      background:var(--sage-pale);
    }
    
    /* 代码块 */
    .art-code{
      background:rgba(74,93,62,.04);border:1px solid var(--border-lt);
      padding:16px 20px;border-radius:4px;overflow-x:auto;
      font-family:var(--font-mono);font-size:12px;color:var(--ink-lt);line-height:1.6;
      margin:16px 0;
    }

    /* 高亮文本 */
    .art-highlight{background:var(--sage-pale);padding:2px 6px;border-radius:2px;color:var(--sage);font-weight:500;}

    /* 项目信息卡片 */
    .proj-card{
      background:var(--sage-pale);border:1px solid var(--border-lt);border-left:3px solid var(--sage);
      padding:20px 22px;margin:20px 0;
    }
    .proj-card-title{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--sage);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;}
    .proj-card-row{display:flex;gap:20px;margin-bottom:10px;font-size:13px;}
    .proj-card-row:last-child{margin-bottom:0;}
    .proj-card-label{font-family:var(--font-mono);font-size:11px;color:var(--muted);min-width:60px;flex-shrink:0;}
    .proj-card-value{color:var(--ink-lt);}

    /* 阶段分隔线 */
    .phase-divider{
      position:relative;margin:32px 0 24px;padding-top:16px;
      border-top:1px dashed var(--border);
    }
    .phase-divider::before{
      content:attr(data-label);
      position:absolute;top:-8px;left:0;
      font-family:var(--font-mono);font-size:8px;font-weight:700;
      color:var(--sage);opacity:.6;letter-spacing:.2em;text-transform:uppercase;
      background:var(--cream);padding-right:10px;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media(max-width:768px){
      :root{--nav-w:180px;}
      .hdr-body{padding:0 14px;gap:10px;}
      .h-title{font-size:15px;}
      .h-tag{padding:2px 7px;font-size:8px;}
      .hdr-meta{padding:0 12px;}
      .hm-row{font-size:8px;}
      .art-body{padding:32px 24px 60px;}
      .sec-title{font-size:19px;}
    }

    @media(max-width:560px){
      .hdr-back.article-mode{width:auto;}
      .hdr-meta{display:none;}
      .nav-panel{width:45px;}
      .nav-name{display:none;}
      .nav-hdr{font-size:0;}
    }

/* 1. 加粗文本块 (模仿 art-lead) */
.art-lead-bold {
    display: block;
    font-size: 16px;
    line-height: 1.75;
    color: var(--ink);
    font-weight: 500;
    margin: 22px 0 0px 0;
    padding-left: 16px;
    border-left: 4px solid var(--sage);
}

/* 2. 无序列表 (模仿 Callout) */
.art-list-callout {
    margin: -10px 0; padding: 16px 20px;
    background: rgba(74,93,62,.04); border: 1px solid rgba(74,93,62,.12);
    border-left: 4px solid var(--sage); list-style: none;
}
.art-list-callout li {
    position: relative; padding-left: 18px; margin-bottom: 8px;
    font-size: 14px; color: var(--ink-lt);
}
.art-list-callout li::before {
    content: "//"; position: absolute; left: 0; color: var(--sage);
    opacity: 0.4; font-family: var(--font-mono); font-size: 10px;
}

/* 3. 有序列表 (模仿 Steps) */
.art-steps-container { margin: 20px 0; border: 1px solid var(--border); background: var(--cream); }
.art-step-item { display: flex; border-bottom: 1px solid var(--border-lt); }
.art-step-item:last-child { border-bottom: none; }
.art-step-num {
    width: 38px; padding: 10px 0; display: flex; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    color: var(--sage); opacity: 0.35; background: rgba(74,93,62,0.02);
    border-right: 1px solid var(--border-lt); flex-shrink: 0;
}
.art-step-content { flex: 1; padding: 10px 14px; font-size: 13.5px; color: var(--ink-lt); }
    
/* --- 关键数据指标 (Metrics) 样式 --- */
.metrics {
    display: flex;
    gap: 1px; /* 间隙显示出背景边框线 */
    margin: 24px 0;
    border: 1px solid var(--border);
    background: var(--border); /* 作为分割线颜色 */
}

.met {
    flex: 1;
    padding: 10px 15px;
    background: var(--cream); /* 块背景色 */
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.met-n {
    font-family: var(--font-mono);
    font-size: 40px;
    font-weight: 900;
    color: var(--sage);
    line-height: 0.8;
    display: block;
}

.met-u {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--sage);
    opacity: 0.6;
    margin-top: -8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
}

.met-d {
    font-size: 12px;
    color: var(--muted);
    margin-top: -18px;
    line-height: 1.5;
}

.art-img {
  width: 100%;
  border-radius: 4px;
  display: block;
  margin: 16px 0;
  box-shadow: 0 8px 32px rgba(74,93,62,.1);
}
    </style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
    <a href="/#cases" class="hdr-back map-mode" id="hdrBack">
        <span class="ba">←</span>
        <span>返回项目列表</span>
    </a>
    <div class="hdr-body">
        <span class="h-idx" id="hIdx">01 / 05</span>
        <h1 class="h-title" id="hTitle">项目名称</h1>
        <div class="h-tags" id="hTags"></div>
    </div>
    <div class="hdr-meta">
        <div class="hm-row"><strong id="hmRole">产品设计</strong></div>
        <div class="hm-row" id="hmYear">2024</div>
    </div>
</header>

<!-- VIEWS CONTAINER -->
<div class="views">

    <!-- VIEW 1: MINDMAP -->
    <div class="view-map" id="viewMap">
        <svg class="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <!-- 滤镜定义 -->
            <defs>
                <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="0.4" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="lineGlowMain" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="0.6" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="lineGlowHover" x="-100%" y="-100%" width="300%" height="300%">
                    <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="dotGlowHover" x="-100%" y="-100%" width="300%" height="300%">
                    <feGaussianBlur stdDeviation="1.8" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <!-- 主箭头定义（简洁线条样式） -->
                <marker id="arrowhead-main" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
                    <path d="M1 0 L10 4 L1 8" fill="none" stroke="rgba(74,93,62,0.75)" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
                </marker>
                
                <!-- 虚线回指箭头（优化线条样式） -->
                <marker id="arrowhead-loop" markerWidth="9" markerHeight="6" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
                    <path d="M1.5 0 L9 3 L1.5 6" fill="none" stroke="rgba(74,93,62,0.45)" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round"/>
                </marker>
                
                <!-- 渐变定义 - 使用主题绿色 -->
                <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#6a7d5e;stop-opacity:0.6"/>
                    <stop offset="100%" style="stop-color:#8a9d7e;stop-opacity:0.85"/>
                </linearGradient>
                <linearGradient id="mainLineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#8a9d7e;stop-opacity:0.45"/>
                    <stop offset="100%" style="stop-color:#6a7d5e;stop-opacity:0.65"/>
                </linearGradient>
            </defs>
            
            <!-- 中心光晕效果 -->
            <circle cx="50" cy="50" r="20" fill="rgba(74,93,62,0.06)"/>
            <circle cx="50" cy="50" r="14" fill="rgba(74,93,62,0.04)"/>
            <circle cx="50" cy="50" r="8" fill="rgba(74,93,62,0.03)"/>
            
            <!-- 轨道圆环 -->
            <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(74,93,62,0.1)" stroke-width="0.35"/>
            
            <!-- 顺时针主线：why(50,20) -> gap(80,50) -> how(50,80) -> challenge(20,50) -> center(50,50) -->
            <!-- why -> gap (12点到3点) -->
            <path class="main-line" d="M50,20 C60,20 78,25 80,50" stroke="url(#mainLineGradient)" stroke-width="1" fill="none" marker-end="url(#arrowhead-main)"/>
            <!-- gap -> how (3点到6点) -->
            <path class="main-line" d="M80,50 C80,58 75,80 50,80" stroke="url(#mainLineGradient)" stroke-width="1" fill="none" marker-end="url(#arrowhead-main)"/>
            <!-- how -> challenge (6点到9点) -->
            <path class="main-line" d="M50,80 C36,80 24,75 20,50" stroke="url(#mainLineGradient)" stroke-width="1" fill="none" marker-end="url(#arrowhead-main)"/>
            <!-- challenge -> center (9点到中心) -->
            <path class="main-line final-line" d="M20,50 C8,42 32,52 50,50" stroke="url(#mainLineGradient)" stroke-width="1.4" fill="none" marker-end="url(#arrowhead-main)"/>
            
            <!-- 虚线回指箭头：center -> why (暗示循环) -->
            <path class="loop-line" d="M50,50 C40,32 42,18 50,20" stroke="rgba(74,93,62,0.25)" stroke-width="0.6" stroke-dasharray="3,3" fill="none" marker-end="url(#arrowhead-loop)"/>
            
            <!-- 分支连接线（从中心到各节点的支撑线） -->
            <path class="branch-line" d="M50,50 L50,20" stroke="rgba(74,93,62,0.15)" stroke-width="0.35" stroke-dasharray="3,2.5" fill="none"/>
            <path class="branch-line" d="M50,50 L80,50" stroke="rgba(74,93,62,0.15)" stroke-width="0.35" stroke-dasharray="3,2.5" fill="none"/>
            <path class="branch-line" d="M50,50 L50,80" stroke="rgba(74,93,62,0.15)" stroke-width="0.35" stroke-dasharray="3,2.5" fill="none"/>
            <path class="branch-line" d="M50,50 L20,50" stroke="rgba(74,93,62,0.15)" stroke-width="0.35" stroke-dasharray="3,2.5" fill="none"/>
            
            <!-- GAP节点与AI工具链节点的支线连接（无方向） -->
            <path class="support-line" d="M80,50 L90,72" stroke="rgba(74,93,62,0.22)" stroke-width="0.3" stroke-dasharray="2,3" fill="none"/>
            
            <!-- 节点标记 -->
            <circle class="node-marker" cx="50" cy="20" r="2" fill="rgba(74,93,62,0.5)" filter="url(#dotGlow)"/>
            <circle class="node-marker" cx="80" cy="50" r="2" fill="rgba(74,93,62,0.5)" filter="url(#dotGlow)"/>
            <circle class="node-marker" cx="50" cy="80" r="2" fill="rgba(74,93,62,0.5)" filter="url(#dotGlow)"/>
            <circle class="node-marker" cx="20" cy="50" r="2" fill="rgba(74,93,62,0.5)" filter="url(#dotGlow)"/>
            
            <!-- 中心节点标记 -->
            <circle class="center-marker" cx="50" cy="50" r="2.5" fill="rgba(74,93,62,0.7)" filter="url(#dotGlow)"/>
        </svg>

        <!-- 中央节点 - 成果与洞察（叙事终点） -->
        <div class="m-center" style="left:50%;top:50%">
            <span class="mc-num" id="mcNum">END</span>
            <span class="mc-title" id="mcTitle">项目名称</span>
            <span class="mc-sub" id="mcSub">成果与洞察</span>
        </div>

        <!-- 章节节点 - 顺时针螺旋布局 -->
        
        <!-- 12点钟方向 - WHY（为什么做这个项目）- 叙事起点 -->
        <div class="m-node m-node-start" data-phase="research" style="left:50%;top:14%" data-section="why">
            <span class="mn-order">01</span>
            <span class="mn-lbl">WHY</span>
            <span class="mn-title">为什么做</span>
            <span class="mn-desc">动机与目标</span>
            <span class="mn-enter">→</span>
        </div>
        
        <!-- 3点钟方向 - GAP（补足了什么）- 承接起点 -->
        <div class="m-node" data-phase="" style="left:85%;top:50%" data-section="gap">
            <span class="mn-order">02</span>
            <span class="mn-lbl">GAP</span>
            <span class="mn-title">补足了什么</span>
            <span class="mn-desc">需求缺口分析</span>
            <span class="mn-enter">→</span>
        </div>
        
        <!-- 6点钟方向 - HOW（如何达成）- 路径实施 -->
        <div class="m-node" data-phase="" style="left:50%;top:86%" data-section="how">
            <span class="mn-order">03</span>
            <span class="mn-lbl">HOW</span>
            <span class="mn-title">如何达成</span>
            <span class="mn-desc">实施路径</span>
            <span class="mn-enter">→</span>
        </div>
        
        <!-- 9点钟方向 - CHALLENGE（克服的困难）- 破局转折 -->
        <div class="m-node m-node-challenge" data-phase="output" style="left:15%;top:50%" data-section="challenge">
            <span class="mn-order">04</span>
            <span class="mn-lbl">CHALLENGE</span>
            <span class="mn-title">克服的困难</span>
            <span class="mn-desc">破局与成长</span>
            <span class="mn-enter">→</span>
        </div>

        <!-- 阶段标注 -->
        <div class="map-phase-label" style="left:45%;top:4%">NARRATIVE START</div>
        <div class="map-phase-label" style="left:93%;top:45%">DEEP DIVE</div>
        <div class="map-phase-label" style="left:45%;top:93%">EXECUTION</div>
        <div class="map-phase-label" style="left:2%;top:45%">BREAKTHROUGH</div>

        <!-- 图例 -->
        <div class="map-legend">
            <div class="legend-item"><div class="legend-line main"></div><span class="legend-label">Main Flow</span></div>
            <div class="legend-item"><div class="legend-line loop"></div><span class="legend-label">Cycle</span></div>
            <div class="legend-item"><div class="legend-dot"></div><span class="legend-label">Node</span></div>
        </div>

    "2026-12-99-test-project3.md",
    "2026-12-99-test-project 4.md",
    "2026-12-99-test-project 5.md",
    "2026-12-99-test-project 6.md"
];

class ContentService {
    constructor() {
        this.cache = new Map();
        this.projectList = null;
    }

    async fetchMarkdown(filePath) {
        const cacheKey = filePath;
        if (this.cache.has(cacheKey)) {
            return this.cache.get(cacheKey);
        }

        try {
            const response = await fetch(filePath);
            if (!response.ok) {
                throw new Error(`Failed to fetch ${filePath}: ${response.status}`);
            }
            const content = await response.text();
            this.cache.set(cacheKey, content);
            return content;
        } catch (error) {
            console.error('ContentService error:', error);
            throw error;
        }
    }

    parseFrontmatter(content) {
        const frontmatterRegex = /^---\n([\s\S]*?)\n---\n([\s\S]*)$/;
        const match = content.match(frontmatterRegex);
        
        if (!match) {
            return { metadata: null, content: content };
        }

        const frontmatter = match[1];
        const markdownContent = match[2];
        
        try {
            const metadata = this.parseYAML(frontmatter);
            return { metadata, content: markdownContent };
        } catch (error) {
            console.warn('Failed to parse frontmatter YAML');
            return { metadata: null, content: content };
        }
    }

    parseYAML(yamlString) {
        const result = {};
        const lines = yamlString.split('\n');
        let currentKey = null;
        let currentArray = [];
        
        for (const line of lines) {
            const trimmedLine = line.trim();
            const leadingSpaces = line.length - trimmedLine.length;
            
            if (!trimmedLine || trimmedLine.startsWith('#')) {
                continue;
            }
            
            if (trimmedLine.startsWith('- ')) {
                const item = trimmedLine.substring(2).trim().replace(/["']/g, '');
                if (currentKey && currentArray !== null) {
                    currentArray.push(item);
                }
                continue;
            }
            
            if (currentKey && currentArray.length > 0) {
                result[currentKey] = currentArray;
                currentKey = null;
                currentArray = [];
            }
            
            const colonIndex = trimmedLine.indexOf(':');
            if (colonIndex === -1) {
                continue;
            }
            
            const key = trimmedLine.substring(0, colonIndex).trim();
            const value = trimmedLine.substring(colonIndex + 1).trim();
            
            if (value === '') {
                currentKey = key;
                currentArray = [];
                continue;
            }
            
            if (value.startsWith('[') && value.endsWith(']')) {
                try {
                    result[key] = JSON.parse(value);
                } catch {
                    result[key] = value.slice(1, -1).split(',').map(item => item.trim().replace(/["']/g, ''));
                }
            } else if (value === 'true' || value === 'false') {
                result[key] = value === 'true';
            } else if (!isNaN(value)) {
                result[key] = parseFloat(value);
            } else if (value.startsWith('"') && value.endsWith('"')) {
                result[key] = value.slice(1, -1);
            } else {
                result[key] = value;
            }
        }
        
        if (currentKey && currentArray.length > 0) {
            result[currentKey] = currentArray;
        }
        
        return result;
    }

    async getProjectById(projectId) {
        for (const fileName of projectFiles) {
            const id = fileName.replace('.md', '');
            if (id === projectId) {
                const content = await this.fetchMarkdown(`/content/projects/${fileName}`);
                const { metadata, content: markdownContent } = this.parseFrontmatter(content);
                return {
                    id: id,
                    ...metadata,
                    content: content,
                    markdown: markdownContent
                };
            }
        }
        return null;
    }
    
    markdownToHtml(markdown) {
        // --- 内部辅助函数：专门负责把文本转为美化后的 HTML ---
        const formatText = (text) => {
            let chContent = text;
            // 1. 处理表格
            chContent = this.parseTables(chContent);
            // --- 新增：处理 Obsidian 图片引用语法 ![[filename.png]] ---
    // 将 ![[图片名.png]] 转换为标准 <img src="路径/图片名.png">
    chContent = chContent.replace(/!\[\[(.*?)\]\]/g, (match, filename) => {
        const imagePath = `/content/projects/attachments/${filename.trim()}`;
        return `<img src="${imagePath}" class="art-img" alt="${filename}" loading="lazy">`;
    });
            
            // --- 新增：处理关键指标 (Metrics) ---
    // 匹配语法: [met: 数字 | 单位 | 描述]
    // 支持多个指标并排显示
    chContent = chContent.replace(/((?:\[met:.*?\]\s*){1,})/g, (match) => {
        const items = match.match(/\[met:(.*?)\]/g);
        const html = items.map(item => {
            // 移除 [met: 和 ]，然后按 | 分割
            const parts = item.slice(5, -1).split('|').map(p => p.trim());
            return `
            <div class="met">
                <span class="met-n">${parts[0] || ''}</span>
                <span class="met-u">${parts[1] || ''}</span>
                ${parts[2] ? `<div class="met-d">${parts[2]}</div>` : ''}
            </div>`;
        }).join('');
        return `<div class="metrics">${html}</div>`;
    });
            
            // 2. 识别有序列表并转为 Steps 样式 (匹配行首 1. )
            chContent = chContent.replace(/(?:^\d+\. .*(?:\r?\n|$))+/gm, (match) => {
                const items = match.trim().split('\n').map((li, idx) => {
                    const text = li.replace(/^\d+\. /, '');
                    return `<div class="art-step-item"><div class="art-step-num">${String(idx+1).padStart(2,'0')}</div><div class="art-step-content">${text}</div></div>`;
                }).join('');
                return `<div class="art-steps-container">${items}</div>`;
            });

            // 3. 识别无序列表并转为 Callout 样式 (匹配行首 - )
            chContent = chContent.replace(/^- (.*$)/gm, (match, text) => {
                const items = text.trim().split('\n').map(li => `<li>${li.replace(/^- /, '')}</li>`).join('');
                return `<ul class="art-list-callout"><li>${text}</li></ul>`;
            });

            // 4. 识别整行加粗转为 art-lead 样式 (匹配行首 ** 和行尾 **)
            chContent = chContent.replace(/^(\*\*)(.*?)(\*\*)$/gm, '<strong class="art-lead-bold">$2</strong>');

            // 5. 常规 Markdown 语法处理
            chContent = chContent.replace(/^### (.*$)/gim, '<h3 class="sec-title sm">$1</h3>');
            chContent = chContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            chContent = chContent.replace(/^> (.*$)/gim, '<blockquote class="art-quote">$1</blockquote>');
            chContent = chContent.replace(/`([^`]+)`/g, '<code class="art-highlight">$1</code>');
            
            // 6. 换行符转 <br>
            chContent = chContent.replace(/\n/g, '<br>');
            return chContent;
        };

        // --- 主逻辑：提取章节 ---
        const lines = markdown.split('\n');
        const chapters = [];
        let chapterId = 0;
        let currentChapter = null;

        // 检查是否存在 ## 标题
        const hasH2 = lines.some(l => /^## (.+)$/.test(l));

        // 如果没有标题（说明是 init 函数的第二次调用），直接处理并返回
        if (!hasH2) {
            return { html: formatText(markdown), chapters: [] };
        }

        // 如果有标题，执行原有的章节提取逻辑
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const h2Match = line.match(/^## (.+)$/);
            
            if (h2Match) {
                if (currentChapter) chapters.push(currentChapter);
                chapterId++;
                currentChapter = {
                    id: `chapter-${chapterId}`,
                    title: h2Match[1],
                    label: `Section ${String(chapterId).padStart(2, '0')}`,
                    content: ''
                };
                continue;
            }
            if (currentChapter) {
                currentChapter.content += line + '\n';
            }
        }
        if (currentChapter) chapters.push(currentChapter);

        // 处理提取出的每个章节的内容
        chapters.forEach(ch => {
            ch.html = formatText(ch.content);
        });

        return { 
            html: chapters.map(c => c.html).join(''), 
            chapters: chapters 
        };
    }
    
    parseTables(text) {
        const tableRegex = /\|(.+)\|\n\|[-:| ]+\|\n((?:\|.+\|\n?)+)/g;
        
        return text.replace(tableRegex, (match, headerRow, bodyRows) => {
            const headers = headerRow.split('|').map(cell => cell.trim()).filter(cell => cell);
            const bodyLines = bodyRows.trim().split('\n');
            
            let html = '<div class="art-table-wrapper"><table class="art-table">';
            html += '<thead><tr>';
            headers.forEach(header => {
                html += `<th>${header}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            bodyLines.forEach(line => {
                const cells = line.split('|').map(cell => cell.trim()).filter(cell => cell);
                if (cells.length > 0) {
                    html += '<tr>';
                    cells.forEach(cell => {
                        html += `<td>${cell}</td>`;
                    });
                    html += '</tr>';
                }
            });
            
            html += '</tbody></table></div>';
            return html;
        });
    }

    async getProjectList() {
        if (this.projectList) {
            return this.projectList;
        }

        const projects = [];

        for (const fileName of projectFiles) {
            try {
                const content = await this.fetchMarkdown(`/content/projects/${fileName}`);
                const { metadata } = this.parseFrontmatter(content);
                
                projects.push({
                    id: fileName.replace('.md', ''),
                    ...metadata
                });
            } catch (error) {
                console.warn(`Failed to load project: ${fileName}`, error);
            }
        }

        this.projectList = projects.sort((a, b) => (a.order || 999) - (b.order || 999));
        return this.projectList;
    }
}

function renderMapNodes(chapters) {
    const nodes = [
        { section: 'why', phase: 'research', left: '50%', top: '14%', label: 'WHY', title: '为什么做', desc: '动机与目标', className: 'm-node-start' },

        { section: 'how', phase: '', left: '50%', top: '86%', label: 'HOW', title: '如何达成', desc: '实施路径', className: '' },
        { section: 'challenge', phase: 'output', left: '15%', top: '50%', label: 'CHALLENGE', title: '克服的困难', desc: '破局与成长', className: 'm-node-challenge' }
    ];

    if (!mapContainer) return;
    
    const existingNodes = mapContainer.querySelectorAll('.m-node');
    existingNodes.forEach(node => node.remove());
    
    nodes.forEach((nodeConfig, index) => {
        const chapter = chapters.find(c => c.id === nodeConfig.section);
        const label = chapter ? chapter.title : nodeConfig.label;
        
        const node = document.createElement('div');
        node.className = `m-node ${nodeConfig.className}`;
        node.dataset.section = nodeConfig.section;
        if (nodeConfig.phase) {
            node.dataset.phase = nodeConfig.phase;
        }
        node.style.left = nodeConfig.left;
        node.style.top = nodeConfig.top;
        
        node.innerHTML = `
            <span class="mn-order">${String(index + 1).padStart(2, '0')}</span>
            <span class="mn-lbl">${nodeConfig.label}</span>
            <span class="mn-title">${nodeConfig.title}</span>
            <span class="mn-desc">${nodeConfig.desc}</span>
            <span class="mn-enter">→</span>
        `;
        
        mapContainer.appendChild(node);
    });
    
    // 添加支撑/旁白子节点
    const supportNode = document.createElement('div');
    supportNode.className = 'm-node m-node-support';
    supportNode.style.left = '90%';
    supportNode.style.top = '72%';
    supportNode.innerHTML = `
        <span class="mn-lbl">AI工具链</span>
        <span class="mn-title">工具与方法</span>
    `;
    mapContainer.appendChild(supportNode);
    
    bindNodeClickEvents();
        
        initNodeDrag();
        updateConnections();
    }

    // 节点位置数据
    const nodePositions = {
        center: { x: 50, y: 50 },
        nodes: {}
    };

    // 初始化节点拖动功能
    function initNodeDrag() {
        const nodes = document.querySelectorAll('.m-node');
        const centerNode = document.querySelector('.m-center');
        
        nodes.forEach(node => {
            let isDragging = false;
            let startX, startY, startLeft, startTop;
            let dragTimeout;
            
            const updateNodePosition = (node) => {
                const rect = node.getBoundingClientRect();
                const containerRect = node.parentElement.getBoundingClientRect();
                const x = (rect.left + rect.width / 2 - containerRect.left) / containerRect.width * 100;
                const y = (rect.top + rect.height / 2 - containerRect.top) / containerRect.height * 100;
                nodePositions.nodes[node.dataset.section] = { x, y };
            };
            
            updateNodePosition(node);
            
            node.addEventListener('mousedown', (e) => {
                e.preventDefault();
                isDragging = false;
                
                dragTimeout = setTimeout(() => {
                    isDragging = true;
                    node.style.zIndex = 100;
                    node.style.cursor = 'grabbing';
                    startX = e.clientX;
                    startY = e.clientY;
                    startLeft = parseFloat(node.style.left);
                    startTop = parseFloat(node.style.top);
                }, 150);
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;
                const containerRect = node.parentElement.getBoundingClientRect();
                
                let newLeft = startLeft + (deltaX / containerRect.width) * 100;
                let newTop = startTop + (deltaY / containerRect.height) * 100;
                
                newLeft = Math.max(10, Math.min(90, newLeft));
                newTop = Math.max(10, Math.min(90, newTop));
                
                node.style.left = `${newLeft}%`;
                node.style.top = `${newTop}%`;
                
                updateNodePosition(node);
                updateConnections();
            });
            
            document.addEventListener('mouseup', () => {
                clearTimeout(dragTimeout);
                if (isDragging) {
                    node.style.zIndex = 5;
                    node.style.cursor = 'pointer';
                    isDragging = false;
                }
            });
        });
    }

    // 计算贝塞尔曲线控制点，实现自然弯曲
    function calculateBezierPoints(startX, startY, endX, endY, curvature = 0.5) {
        const dx = endX - startX;
        const dy = endY - startY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        const angle = Math.atan2(dy, dx);
        const perpAngle = angle + Math.PI / 2;
        
        const controlOffset = distance * curvature * (Math.random() > 0.5 ? 1 : -1) * 0.3;
        
        const midX = (startX + endX) / 2;
        const midY = (startY + endY) / 2;
        
        const ctrlX = midX + Math.cos(perpAngle) * controlOffset;
        const ctrlY = midY + Math.sin(perpAngle) * controlOffset;
        
        return {
            start: { x: startX, y: startY },
            control: { x: ctrlX, y: ctrlY },
            end: { x: endX, y: endY }
        };
    }

    // 根据节点位置更新连接线
    function updateConnections() {
        const svg = document.querySelector('.map-svg');
        if (!svg) return;
        
        const nodes = document.querySelectorAll('.m-node');
        const centerX = 50;
        const centerY = 50;
        
        nodes.forEach((node, index) => {
            const section = node.dataset.section;
            const pos = nodePositions.nodes[section];
            if (!pos) return;
            
            const starLines = svg.querySelectorAll('.star-line');
            if (starLines[index]) {
                const curve = calculateBezierPoints(centerX, centerY, pos.x, pos.y, 0.4);
                starLines[index].setAttribute('d', `M${curve.start.x},${curve.start.y} C${curve.control.x},${curve.control.y} ${curve.end.x},${curve.end.y}`);
            }
        });
        
        const flowLines = svg.querySelectorAll('.flow-line');
        const nodeArray = Array.from(nodes);
        const sortedNodes = nodeArray.sort((a, b) => {
            const posA = nodePositions.nodes[a.dataset.section];
            const posB = nodePositions.nodes[b.dataset.section];
            if (!posA || !posB) return 0;
            
            const angleA = Math.atan2(posA.y - 50, posA.x - 50);
            const angleB = Math.atan2(posB.y - 50, posB.x - 50);
            return angleA - angleB;
        });
        
        sortedNodes.forEach((node, index) => {
            const currentPos = nodePositions.nodes[node.dataset.section];
            const nextNode = sortedNodes[(index + 1) % sortedNodes.length];
            const nextPos = nodePositions.nodes[nextNode.dataset.section];
            
            if (!currentPos || !nextPos || !flowLines[index]) return;
            
            const curve = calculateBezierPoints(currentPos.x, currentPos.y, nextPos.x, nextPos.y, 0.3);
            flowLines[index].setAttribute('d', `M${curve.start.x},${curve.start.y} C${curve.control.x},${curve.control.y} ${curve.end.x},${curve.end.y}`);
        });
    }

    // 节点高亮时同步高亮连接线
    function initNodeHighlight() {
        const nodes = document.querySelectorAll('.m-node');
        const svg = document.querySelector('.map-svg');
        
        nodes.forEach((node, index) => {
            node.addEventListener('mouseenter', () => {
                const starLines = svg.querySelectorAll('.star-line');
                if (starLines[index]) {
                    starLines[index].classList.add('highlighted');
                }
                
                const flowLines = svg.querySelectorAll('.flow-line');
                flowLines.forEach((line, i) => {
                    if (i === index || i === (index - 1 + flowLines.length) % flowLines.length) {
                        line.classList.add('highlighted');
                    }
                });
            });
            
            node.addEventListener('mouseleave', () => {
                svg.querySelectorAll('path.highlighted').forEach(path => {
                    path.classList.remove('highlighted');
                });
            });
        });
    }
    
    initNodeHighlight();

    // 滚动进度
document.querySelector('.art-panel').addEventListener('scroll', (e) => {
    const panel = e.target;
    const scrollTop = panel.scrollTop;
    const scrollHeight = panel.scrollHeight - panel.clientHeight;
    const progress = (scrollTop / scrollHeight) * 100;
    readBar.style.width = `${progress}%`;
    
    const sections = document.querySelectorAll('.art-section');
    const navItems = document.querySelectorAll('.nav-item');
    
    sections.forEach((sec, index) => {
        const rect = sec.getBoundingClientRect();
        const isActive = rect.top < panel.clientHeight / 2 && rect.bottom > panel.clientHeight / 2;
        
        if (navItems[index]) {
            navItems[index].classList.toggle('active', isActive);
        }
    });
});

// 更新导航栏
function updateNavigation(chapters) {
    const navList = document.getElementById('navList');
    navList.innerHTML = '';
    
    chapters.forEach((chapter, index) => {
        const navItem = document.createElement('div');
        navItem.className = `nav-item ${index === 0 ? 'active' : ''}`;
        navItem.dataset.section = chapter.id;
        
        navItem.innerHTML = `
            <div class="nav-dot"></div>
            <span class="nav-name">${chapter.title}</span>
            <div class="nav-prog"><div class="nav-prog-fill" style="width:0%"></div></div>
        `;
        
        navList.appendChild(navItem);
    });
    
    navList.addEventListener('click', (e) => {
        const navItem = e.target.closest('.nav-item');
        if (navItem) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            navItem.classList.add('active');
            
            const sectionId = navItem.dataset.section;
            const targetSec = document.getElementById(`sec-${sectionId}`);
            if (targetSec) {
                targetSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    });
}

            `;
            
            const sections = {
                overview: {
                    label: 'Overview',
                    title: '项目概览',
                    content: overviewContent
                }
            };
            
            if (chapters.length > 0) {
    chapters.forEach((chapter, index) => {
        // 强制 ID 格式为 chapter-1, chapter-2...
        const fixedId = `chapter-${index + 1}`;
        const chapterHtml = contentService.markdownToHtml(chapter.content);
        sections[fixedId] = {
            label: chapter.label || `Section 0${index + 1}`,

            content: chapterHtml.html

}
            
            projectData = {
                id: project.id,
                number: String(project.order || 1).padStart(2, '0'),

                year: project.year || '待定',
                tags: project.tags || [],
                sections: sections
            };
            
            const allChapters = [{ id: 'overview', title: '项目概览' }, ...(chapters.length > 0 ? chapters : [{ id: 'background', title: '项目背景' }])];
            updateNavigation(allChapters);
            renderMapNodes(chapters.length > 0 ? chapters : [{ id: 'background', title: '项目背景' }]);

    }
    
    updateHeader();
    
    if (section) {
        if (projectData.sections[section]) {
            showArticleView(section);
        } else {
            const firstSection = Object.keys(projectData.sections)[0];
            if (firstSection) {
                showArticleView(firstSection);
            }
        }
    }
}


init();
